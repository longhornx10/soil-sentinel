name: Apply Soil Sentinel audit fixes

on:
  push:
    branches:
      - feat/final-field-bundle
    paths:
      - .github/workflows/apply-soil-audit-fixes.yml

permissions:
  contents: write

jobs:
  patch-test-build:
    if: github.event.head_commit.message == 'chore: apply soil audit fixes'
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/final-field-bundle
          fetch-depth: 0

      - name: Apply guarded source changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text()
              actual = text.count(old)
              if actual != count:
                  raise SystemExit(f"{path}: expected {count} occurrence(s), found {actual}: {old[:80]!r}")
              file.write_text(text.replace(old, new, count))

          # Use the public POSIX system-time API. ESP-IDF's default system-time
          # source includes the RTC timer, so it survives deep sleep.
          replace(
              "main/app_main.c",
              '#include <math.h>\n',
              '#include <math.h>\n#include <sys/time.h>\n',
          )
          replace(
              "main/app_main.c",
              '#include "esp_private/esp_clk.h"\n',
              '',
          )
          replace(
              "main/app_main.c",
              'static uint32_t elapsed_seconds_between(uint64_t now_us, uint64_t before_us)\n{\n',
              '''static uint64_t current_time_us(void)\n{
              struct timeval now = {0};
              if (gettimeofday(&now, NULL) != 0) return 0U;
              return (uint64_t)now.tv_sec * 1000000ULL + (uint64_t)now.tv_usec;
          }

          static uint32_t elapsed_seconds_between(uint64_t now_us, uint64_t before_us)
          {
          ''',
          )
          replace("main/app_main.c", "esp_clk_rtc_time()", "current_time_us()", count=2)

          # Calibrated millivolts are part of the persisted soil model. Do not
          # silently substitute a nominal full-scale conversion when calibration
          # initialization or conversion fails.
          replace(
              "main/board.c",
              '''    int mv = 0;
              if (cali && adc_cali_raw_to_voltage(cali, raw, &mv) == ESP_OK) {
                  *value_mv = (float)mv;
                  if (noise_mv) {
                      int lo = 0, hi = 0;
                      if (adc_cali_raw_to_voltage(cali, values[3], &lo) == ESP_OK &&
                          adc_cali_raw_to_voltage(cali, values[SAMPLE_COUNT - 4], &hi) == ESP_OK) {
                          *noise_mv = (float)(hi - lo);
                      } else {
                          *noise_mv = 0.0f;
                      }
                  }
                  return ESP_OK;
              }

              *value_mv = raw * 3300.0f / 4095.0f;
              if (noise_mv) {
                  *noise_mv = (values[SAMPLE_COUNT - 4] - values[3]) * 3300.0f / 4095.0f;
              }
              return ESP_OK;
          ''',
              '''    ESP_RETURN_ON_FALSE(cali, ESP_ERR_INVALID_STATE, TAG,
                                  "ADC calibration handle is unavailable");
              int mv = 0;
              ESP_RETURN_ON_ERROR(adc_cali_raw_to_voltage(cali, raw, &mv), TAG,
                                  "ADC calibrated conversion failed");
              *value_mv = (float)mv;
              if (noise_mv) {
                  int lo = 0, hi = 0;
                  ESP_RETURN_ON_ERROR(adc_cali_raw_to_voltage(cali, values[3], &lo), TAG,
                                      "ADC low-noise conversion failed");
                  ESP_RETURN_ON_ERROR(
                      adc_cali_raw_to_voltage(cali, values[SAMPLE_COUNT - 4], &hi), TAG,
                      "ADC high-noise conversion failed");
                  *noise_mv = (float)(hi - lo);
              }
              return ESP_OK;
          ''',
          )
          replace(
              "main/board.c",
              '''    (void)adc_cali_create_scheme_curve_fitting(&soil_cali_cfg, &s_soil_cali);
              (void)adc_cali_create_scheme_curve_fitting(&battery_cali_cfg, &s_battery_cali);
              return ESP_OK;
          ''',
              '''    ESP_RETURN_ON_ERROR(
                  adc_cali_create_scheme_curve_fitting(&soil_cali_cfg, &s_soil_cali), TAG,
                  "soil ADC calibration init failed");
              ESP_RETURN_ON_ERROR(
                  adc_cali_create_scheme_curve_fitting(&battery_cali_cfg, &s_battery_cali), TAG,
                  "battery ADC calibration init failed");
              return ESP_OK;
          ''',
          )

          # Add explicit battery hysteresis and make confidence computation
          # identical for first and subsequent valid samples.
          replace(
              "core/src/soil_model.c",
              '''#define SOIL_RELOCATION_JUMP_MV 1200.0f
          ''',
              '''#define SOIL_RELOCATION_JUMP_MV 1200.0f
          #define BATTERY_SURVIVAL_ENTER_PCT 8.0f
          #define BATTERY_SURVIVAL_EXIT_PCT 10.0f
          #define BATTERY_CONSERVATION_ENTER_PCT 20.0f
          #define BATTERY_CONSERVATION_EXIT_PCT 23.0f
          ''',
          )
          replace(
              "core/src/soil_model.c",
              '''static void apply_battery_mode(soil_state_t *state)
          {
              if (!state->battery_present) return;

              if (state->battery_pct <= 8.0f) {
                  state->mode = SOIL_MODE_SURVIVAL;
                  state->sample_interval_seconds = 12u * 60u * 60u;
              } else if (state->battery_pct <= 20.0f && state->mode == SOIL_MODE_STABLE) {
                  state->mode = SOIL_MODE_CONSERVATION;
                  state->sample_interval_seconds = 12u * 60u * 60u;
              }
          }
          ''',
              '''static bool battery_survival_active(float battery_pct, soil_mode_t previous_mode)
          {
              return battery_pct <= BATTERY_SURVIVAL_ENTER_PCT ||
                     (previous_mode == SOIL_MODE_SURVIVAL &&
                      battery_pct < BATTERY_SURVIVAL_EXIT_PCT);
          }

          static bool battery_event_changed(bool previous_present,
                                            float previous_pct,
                                            float current_pct,
                                            soil_mode_t previous_mode)
          {
              if (!previous_present) return true;
              if (previous_mode == SOIL_MODE_SURVIVAL) {
                  return current_pct >= BATTERY_SURVIVAL_EXIT_PCT;
              }
              if (current_pct <= BATTERY_SURVIVAL_ENTER_PCT &&
                  previous_pct > BATTERY_SURVIVAL_ENTER_PCT) {
                  return true;
              }
              if (previous_mode == SOIL_MODE_CONSERVATION) {
                  return current_pct >= BATTERY_CONSERVATION_EXIT_PCT;
              }
              return current_pct <= BATTERY_CONSERVATION_ENTER_PCT &&
                     previous_pct > BATTERY_CONSERVATION_ENTER_PCT;
          }

          static float measurement_confidence(float noise_mv, bool noise_fault)
          {
              return noise_fault
                         ? 0.0f
                         : clampf(100.0f - noise_mv * 0.8f, 0.0f, 100.0f);
          }

          static void apply_battery_mode(soil_state_t *state, soil_mode_t previous_mode)
          {
              if (!state->battery_present) return;

              if (battery_survival_active(state->battery_pct, previous_mode)) {
                  state->mode = SOIL_MODE_SURVIVAL;
                  state->sample_interval_seconds = 12u * 60u * 60u;
                  return;
              }

              const bool conservation_active =
                  state->battery_pct <= BATTERY_CONSERVATION_ENTER_PCT ||
                  (previous_mode == SOIL_MODE_CONSERVATION &&
                   state->battery_pct < BATTERY_CONSERVATION_EXIT_PCT);
              if (conservation_active && state->mode == SOIL_MODE_STABLE) {
                  state->mode = SOIL_MODE_CONSERVATION;
                  state->sample_interval_seconds = 12u * 60u * 60u;
              }
          }
          ''',
          )
          replace(
              "core/src/soil_model.c",
              '''    if (sample->battery_present) {
                  const bool battery_state_changed =
                      !previous_battery_present ||
                      (previous_battery_pct > 20.0f && state->battery_pct <= 20.0f) ||
                      (previous_battery_pct > 8.0f && state->battery_pct <= 8.0f);
                  if (battery_state_changed) state->event_flags |= SOIL_EVENT_BATTERY;
              }
          ''',
              '''    if (sample->battery_present &&
                  battery_event_changed(previous_battery_present,
                                        previous_battery_pct,
                                        state->battery_pct,
                                        previous_mode)) {
                  state->event_flags |= SOIL_EVENT_BATTERY;
              }
          ''',
          )
          replace(
              "core/src/soil_model.c",
              '''        state->mode =
                      sample->battery_present && state->battery_pct <= 8.0f
                          ? SOIL_MODE_SURVIVAL
                          : SOIL_MODE_CONSERVATION;
          ''',
              '''        state->mode =
                      sample->battery_present &&
                              battery_survival_active(state->battery_pct, previous_mode)
                          ? SOIL_MODE_SURVIVAL
                          : SOIL_MODE_CONSERVATION;
          ''',
          )
          replace(
              "core/src/soil_model.c",
              '''        state->confidence_pct =
                      noise_fault ? 0.0f
                                  : clampf(100.0f - sample->noise_mv, 0.0f, 100.0f);
          ''',
              '''        state->confidence_pct =
                      measurement_confidence(sample->noise_mv, noise_fault);
          ''',
          )
          replace("core/src/soil_model.c", "        apply_battery_mode(state);", "        apply_battery_mode(state, previous_mode);", count=1)
          replace(
              "core/src/soil_model.c",
              '''    state->confidence_pct =
                  noise_fault
                      ? 0.0f
                      : clampf(100.0f - sample->noise_mv * 0.8f, 0.0f, 100.0f);
          ''',
              '''    state->confidence_pct =
                  measurement_confidence(sample->noise_mv, noise_fault);
          ''',
          )
          replace("core/src/soil_model.c", "    apply_battery_mode(state);", "    apply_battery_mode(state, previous_mode);", count=1)

          # Bound every task-side Zigbee lock acquisition. A missed report is
          # recoverable next wake; a permanently blocked battery task is not.
          replace(
              "main/zigbee_transport.c",
              '#define AF_CONFIRM_SUCCESS 0x00U\n',
              '#define AF_CONFIRM_SUCCESS 0x00U\n#define ZIGBEE_LOCK_TIMEOUT_MS 2000U\n',
          )
          replace(
              "main/zigbee_transport.c",
              '''static ezb_err_t start_commissioning(ezb_bdb_comm_mode_mask_t mode,
                                                   const char *reason)
          ''',
              '''static bool acquire_zigbee_lock(const char *operation)
          {
              if (esp_zigbee_lock_acquire(pdMS_TO_TICKS(ZIGBEE_LOCK_TIMEOUT_MS))) {
                  return true;
              }
              ESP_LOGE(TAG, "timed out acquiring Zigbee lock for %s", operation);
              return false;
          }

          static ezb_err_t start_commissioning(ezb_bdb_comm_mode_mask_t mode,
                                                   const char *reason)
          ''',
          )
          replace(
              "main/zigbee_transport.c",
              '''    const ezb_bdb_comm_mode_mask_t mode = s_retry_mode;
              esp_zigbee_lock_acquire(portMAX_DELAY);
              const ezb_err_t err = start_commissioning(mode, "scheduled retry");
              esp_zigbee_lock_release();
              s_retry_pending = false;
          ''',
              '''    const ezb_bdb_comm_mode_mask_t mode = s_retry_mode;
              if (!acquire_zigbee_lock("commissioning retry")) {
                  s_retry_pending = false;
                  vTaskDelete(NULL);
                  return;
              }
              const ezb_err_t err = start_commissioning(mode, "scheduled retry");
              esp_zigbee_lock_release();
              s_retry_pending = false;
          ''',
          )
          replace(
              "main/zigbee_transport.c",
              '''    esp_zigbee_lock_acquire(portMAX_DELAY);
              sync_control_cluster();
          ''',
              '''    if (!acquire_zigbee_lock("state publish")) return ESP_ERR_TIMEOUT;
              sync_control_cluster();
          ''',
          )
          replace(
              "main/zigbee_transport.c",
              '''    esp_zigbee_lock_acquire(portMAX_DELAY);
              const esp_err_t err = firmware_update_request_image(ENDPOINT_ID);
          ''',
              '''    if (!acquire_zigbee_lock("OTA image query")) return ESP_ERR_TIMEOUT;
              const esp_err_t err = firmware_update_request_image(ENDPOINT_ID);
          ''',
          )

          # Build ZCL character strings from their actual literals instead of
          # maintaining hand-counted prefix bytes.
          replace(
              "main/zigbee_transport.c",
              '''static uint8_t s_sw_build_id[33] = {0};
          ''',
              '''static uint8_t s_sw_build_id[33] = {0};
          static uint8_t s_manufacturer_name[sizeof("longhornx10")] = {0};
          static uint8_t s_model_identifier[sizeof("Soil Sentinel")] = {0};
          static uint8_t s_moisture_description[sizeof("Soil moisture")] = {0};
          ''',
          )
          replace(
              "main/zigbee_transport.c",
              '''static uint16_t clamp_u16(float value)
          ''',
              '''static bool init_zcl_string(uint8_t *destination,
                                      size_t capacity,
                                      const char *value)
          {
              if (!destination || !value || capacity == 0U) return false;
              const size_t length = strlen(value);
              if (length > UINT8_MAX || length + 1U > capacity) return false;
              destination[0] = (uint8_t)length;
              memcpy(&destination[1], value, length);
              return true;
          }

          static uint16_t clamp_u16(float value)
          ''',
          )
          replace(
              "main/zigbee_transport.c",
              '''static esp_err_t create_device(void)
          {
              initialize_desired_values();
          ''',
              '''static esp_err_t create_device(void)
          {
              initialize_desired_values();
              ESP_RETURN_ON_FALSE(
                  init_zcl_string(s_manufacturer_name, sizeof(s_manufacturer_name),
                                  "longhornx10"),
                  ESP_ERR_INVALID_SIZE, TAG, "manufacturer string is too long");
              ESP_RETURN_ON_FALSE(
                  init_zcl_string(s_model_identifier, sizeof(s_model_identifier),
                                  "Soil Sentinel"),
                  ESP_ERR_INVALID_SIZE, TAG, "model string is too long");
              ESP_RETURN_ON_FALSE(
                  init_zcl_string(s_moisture_description,
                                  sizeof(s_moisture_description),
                                  "Soil moisture"),
                  ESP_ERR_INVALID_SIZE, TAG, "description string is too long");
          ''',
          )
          replace(
              "main/zigbee_transport.c",
              '''    ezb_zcl_basic_cluster_desc_add_attr(basic,
                  EZB_ZCL_ATTR_BASIC_MANUFACTURER_NAME_ID, (void *)"\\x0b""longhornx10");
              ezb_zcl_basic_cluster_desc_add_attr(basic,
                  EZB_ZCL_ATTR_BASIC_MODEL_IDENTIFIER_ID, (void *)"\\x0d""Soil Sentinel");
          ''',
              '''    ezb_zcl_basic_cluster_desc_add_attr(basic,
                  EZB_ZCL_ATTR_BASIC_MANUFACTURER_NAME_ID, s_manufacturer_name);
              ezb_zcl_basic_cluster_desc_add_attr(basic,
                  EZB_ZCL_ATTR_BASIC_MODEL_IDENTIFIER_ID, s_model_identifier);
          ''',
          )
          replace(
              "main/zigbee_transport.c",
              '''    ezb_zcl_analog_input_cluster_desc_add_attr(moisture,
                  EZB_ZCL_ATTR_ANALOG_INPUT_DESCRIPTION_ID, (void *)"\\x0d""Soil moisture");
          ''',
              '''    ezb_zcl_analog_input_cluster_desc_add_attr(moisture,
                  EZB_ZCL_ATTR_ANALOG_INPUT_DESCRIPTION_ID, s_moisture_description);
          ''',
          )

          # Add coverage for the previously untested state paths and regressions.
          tests = r'''
          static void test_battery_mode_hysteresis(void)
          {
              soil_policy_t p = soil_policy_default();
              soil_state_t s = {0};

              soil_sample_t depleted = sample(2000.0f, 1050.0f, 5.0f);
              soil_model_step(&p, &depleted, &s);
              assert(s.mode == SOIL_MODE_SURVIVAL);

              soil_sample_t survival_exit = sample(2000.0f, 1150.0f, 5.0f);
              soil_model_step(&p, &survival_exit, &s);
              assert(s.mode == SOIL_MODE_CONSERVATION);
              assert((s.event_flags & SOIL_EVENT_BATTERY) != 0U);

              soil_sample_t survival_wobble = sample(2000.0f, 1135.0f, 5.0f);
              soil_model_step(&p, &survival_wobble, &s);
              assert(s.mode == SOIL_MODE_CONSERVATION);
              assert((s.event_flags & SOIL_EVENT_BATTERY) == 0U);

              soil_sample_t conservation_exit = sample(2000.0f, 1215.0f, 5.0f);
              soil_model_step(&p, &conservation_exit, &s);
              assert(s.mode == SOIL_MODE_STABLE);
              assert((s.event_flags & SOIL_EVENT_BATTERY) != 0U);

              soil_sample_t conservation_wobble = sample(2000.0f, 1200.0f, 5.0f);
              soil_model_step(&p, &conservation_wobble, &s);
              assert(s.mode == SOIL_MODE_STABLE);
              assert((s.event_flags & SOIL_EVENT_BATTERY) == 0U);

              soil_sample_t conservation_enter = sample(2000.0f, 1195.0f, 5.0f);
              soil_model_step(&p, &conservation_enter, &s);
              assert(s.mode == SOIL_MODE_CONSERVATION);
              assert((s.event_flags & SOIL_EVENT_BATTERY) != 0U);
          }

          static void test_confidence_formula_is_consistent(void)
          {
              soil_policy_t p = soil_policy_default();
              soil_state_t s = {0};
              soil_sample_t first = sample(2000.0f, 1450.0f, 50.0f);
              soil_model_step(&p, &first, &s);
              assert(fabsf(s.confidence_pct - 60.0f) < 0.01f);

              soil_sample_t second = sample(2000.0f, 1450.0f, 50.0f);
              soil_model_step(&p, &second, &s);
              assert(fabsf(s.confidence_pct - 60.0f) < 0.01f);
          }

          static void test_drying_rate_ema_and_mode(void)
          {
              soil_policy_t p = soil_policy_default();
              soil_state_t s = {0};
              soil_sample_t first = sample(1800.0f, 1450.0f, 5.0f);
              soil_model_step(&p, &first, &s);

              soil_sample_t drying = sample(1900.0f, 1450.0f, 5.0f);
              drying.elapsed_seconds = 3600U;
              soil_model_step(&p, &drying, &s);

              const float before = soil_calibrated_percent(1800.0f, 2750.0f, 1200.0f);
              const float after = soil_calibrated_percent(1900.0f, 2750.0f, 1200.0f);
              const float expected = 0.25f * (before - after);
              assert(fabsf(s.drying_rate_pct_per_hour - expected) < 0.01f);
              assert(s.mode == SOIL_MODE_DRYING);
          }

          static void test_hard_fault_still_emits_heartbeat(void)
          {
              soil_policy_t p = soil_policy_default();
              soil_state_t s = {0};
              soil_sample_t first = sample(2000.0f, 1450.0f, 5.0f);
              soil_model_step(&p, &first, &s);

              soil_sample_t broken = sample(0.0f, 1450.0f, 5.0f);
              broken.elapsed_seconds = p.heartbeat_seconds;
              soil_model_step(&p, &broken, &s);
              assert((s.event_flags & SOIL_EVENT_HEARTBEAT) != 0U);
              assert(s.should_report);
          }

          static void test_watering_age_saturates(void)
          {
              soil_policy_t p = soil_policy_default();
              soil_state_t s = {0};
              soil_sample_t first = sample(2000.0f, 1450.0f, 5.0f);
              soil_model_step(&p, &first, &s);
              s.has_watered = true;
              s.seconds_since_watering = UINT32_MAX - 10U;

              soil_sample_t next = sample(2000.0f, 1450.0f, 5.0f);
              next.elapsed_seconds = 100U;
              soil_model_step(&p, &next, &s);
              assert(s.seconds_since_watering == UINT32_MAX);
          }

          static void test_noise_fault_keeps_finite_sample_valid(void)
          {
              soil_policy_t p = soil_policy_default();
              soil_state_t s = {0};
              soil_sample_t first = sample(2000.0f, 1450.0f, 5.0f);
              soil_model_step(&p, &first, &s);

              soil_sample_t noisy = sample(2000.0f, 1450.0f,
                                           p.noise_fault_mv + 1.0f);
              soil_model_step(&p, &noisy, &s);
              assert(s.sensor_fault);
              assert(s.current_sample_valid);
              assert(s.confidence_pct == 0.0f);
              assert((s.event_flags & SOIL_EVENT_FAULT) != 0U);
          }

          '''
          replace("tests/test_soil_model.c", "int main(void)\n{\n", tests + "int main(void)\n{\n")
          replace(
              "tests/test_soil_model.c",
              '''    test_low_battery_survival();
              test_usb_without_battery_does_not_force_survival();
              test_hard_fault_preserves_last_valid_moisture();
              test_telemetry_flags();
          ''',
              '''    test_low_battery_survival();
              test_battery_mode_hysteresis();
              test_usb_without_battery_does_not_force_survival();
              test_hard_fault_preserves_last_valid_moisture();
              test_hard_fault_still_emits_heartbeat();
              test_confidence_formula_is_consistent();
              test_drying_rate_ema_and_mode();
              test_watering_age_saturates();
              test_noise_fault_keeps_finite_sample_valid();
              test_telemetry_flags();
          ''',
          )
          PY

      - name: Run host tests
        shell: bash
        run: ./scripts/test-host.sh

      - name: Build ESP-IDF firmware
        shell: bash
        run: idf.py build

      - name: Commit fixes to pull-request branch
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main/app_main.c main/board.c main/zigbee_transport.c core/src/soil_model.c tests/test_soil_model.c
          git commit -m "fix: harden field firmware after audit"
          git push origin HEAD:feat/final-field-bundle
